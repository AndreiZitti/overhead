<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1" />
    <meta name="theme-color" content="#05060c" />
    <title>Overhead — Live Satellite Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,300..700,0..100&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
          crossorigin="" />
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
            crossorigin=""></script>
  </head>
  <body>
    <div class="app">

      <!-- Compact translucent header overlaying the top of the map -->
      <header class="app-header">
        <div class="brand">
          <span class="star">✦</span><span class="brand-name">Overhead</span>
        </div>
        <div class="mode-toggle" id="modeToggle">
          <button class="mode-chip active" data-mode="sats">Sats</button>
          <button class="mode-chip" data-mode="flights">Flights</button>
        </div>
        <div class="meta">
          <strong id="locName">Locating…</strong>
          <span id="clock">--:--:--</span>
        </div>
      </header>

      <!-- Map fills the rest of the viewport. -->
      <main class="map-area">
        <div id="map"></div>
        <canvas id="bg-overlay"></canvas>
        <canvas id="sat-overlay"></canvas>

        <!-- Top-left: tracking pill + load status -->
        <div class="status-pill">
          <span class="dot" id="loadDot"></span>
          <span class="pill-label">tracking</span>
          <strong id="totalCount">—</strong>
          <span class="pill-sep">·</span>
          <span class="pill-label">above</span>
          <strong id="visCount">—</strong>
        </div>

        <!-- Bottom-left: next pass chip -->
        <div class="next-pass" id="nextPass" hidden>
          <div class="np-label">Next overhead</div>
          <div class="np-name" id="npName">—</div>
          <div class="np-when" id="npWhen">—</div>
          <div class="np-dir" id="npDir">—</div>
        </div>

        <!-- Centered loading pill (flight fetch in flight). -->
        <div class="map-loading" id="mapLoading" hidden>
          <span class="spinner"></span>
          <span class="loading-text" id="loadingText">Loading…</span>
        </div>

        <!-- Bottom-right floating action: open filters drawer -->
        <button class="fab" id="fabFilters" aria-label="Filters">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
            <line x1="4" y1="7" x2="20" y2="7"/>
            <line x1="4" y1="12" x2="20" y2="12"/>
            <line x1="4" y1="17" x2="20" y2="17"/>
            <circle cx="9" cy="7" r="2.5" fill="var(--bg-1)"/>
            <circle cx="15" cy="12" r="2.5" fill="var(--bg-1)"/>
            <circle cx="9" cy="17" r="2.5" fill="var(--bg-1)"/>
          </svg>
        </button>
      </main>

      <!-- Bottom sheet: collapsed peek by default, tap to expand -->
      <div class="sheet" id="sheet">
        <button class="sheet-toggle" id="sheetToggle" aria-label="Toggle sheet">
          <span class="sheet-handle"></span>
          <span class="sheet-summary" id="sheetSummary">Above you · 0</span>
          <span class="sheet-arrow">▾</span>
        </button>
        <div class="sheet-body">
          <div class="detail" id="detail" hidden></div>
          <div class="sat-list" id="satList">
            <div class="empty">Acquiring orbital data…</div>
          </div>
        </div>
      </div>

      <!-- Filters drawer: hidden by default, slides in from the right -->
      <aside class="drawer" id="drawer" aria-hidden="true">
        <header class="drawer-header">
          <h3>Filters</h3>
          <button class="drawer-close" id="drawerClose" aria-label="Close">×</button>
        </header>
        <div class="drawer-body">
          <section class="drawer-sec">
            <div class="drawer-label">Groups</div>
            <div class="chips" id="groupChips">
              <button class="chip active" data-group="active">All Active</button>
              <button class="chip active" data-group="starlink">Starlink</button>
              <button class="chip" data-group="last30">Recent 30d</button>
            </div>
          </section>
          <section class="drawer-sec">
            <div class="drawer-label">Display</div>
            <div class="chips">
              <button class="chip active" id="sunlitToggle">Sunlit only</button>
              <button class="chip active" id="bgDotsToggle">Background dots</button>
              <button class="chip" id="redMode">Night vision</button>
            </div>
          </section>
          <section class="drawer-sec">
            <div class="drawer-label">Location</div>
            <div class="chips">
              <button class="chip" id="locBtn">Re-locate me</button>
            </div>
          </section>
          <p class="drawer-foot">
            Orbital data: <a href="https://celestrak.org" target="_blank">CelesTrak</a><br>
            Tiles: <a href="https://carto.com/attributions" target="_blank">CARTO</a> · <a href="https://www.openstreetmap.org/copyright" target="_blank">OSM</a><br>
            All math runs in your browser.
          </p>
        </div>
      </aside>

      <!-- Drawer scrim — tap to close -->
      <div class="scrim" id="scrim" hidden></div>

    </div>

    <div class="toast" id="toast"></div>

    <script type="module" src="src/main.js"></script>
  </body>
</html>
